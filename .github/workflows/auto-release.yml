name: Auto-release (hourly)

on:
  schedule:
    - cron: "0 * * * *" # каждый час
  workflow_dispatch: # ручной запуск

permissions:
  contents: write
  actions: write # для workflow_dispatch других workflows

# --- AI Changelog ---
# Для красивого changelog нужен токен GitHub с доступом к GitHub Models API.
# 1. Создайте Personal Access Token (classic) на https://github.com/settings/tokens
#    или Fine-grained token с permission "Models" → Read
# 2. Добавьте его в Settings → Secrets → Actions как COPILOT_TOKEN
# Без токена changelog будет генерироваться из очищенных коммит-сообщений (без мерж-коммитов).

jobs:
  release:
    name: Check for changes and release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # полная история для тегов

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check for new commits since last tag
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tags found"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMIT_COUNT=$(git rev-list "${LAST_TAG}..HEAD" --count)
          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "No new commits since $LAST_TAG"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "$COMMIT_COUNT new commit(s) since $LAST_TAG"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
            git log "${LAST_TAG}..HEAD" --pretty=format:'- %s' > /tmp/commits.txt
          fi

      - name: Bump patch version
        if: steps.check.outputs.has_changes == 'true'
        id: bump
        run: |
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW_VERSION"

      - name: Generate changelog entry
        if: steps.check.outputs.has_changes == 'true'
        env:
          AI_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          COMMITS=$(cat /tmp/commits.txt)

          # --- Фолбек: очищенные коммиты без merge/release шума ---
          generate_fallback() {
            grep -v -E '^- (Merge pull request|chore\(release\))' /tmp/commits.txt \
              > /tmp/changelog_entry.txt || true
            # если после фильтрации ничего не осталось — берём всё
            if [ ! -s /tmp/changelog_entry.txt ]; then
              cp /tmp/commits.txt /tmp/changelog_entry.txt
            fi
          }

          # Без токена — сразу фолбек
          if [ -z "$AI_TOKEN" ]; then
            echo "ℹ️ COPILOT_TOKEN не настроен — используем очищенные коммиты"
            generate_fallback
            exit 0
          fi

          # --- AI-генерация через GitHub Models API ---
          cat > /tmp/prompt.txt << 'PROMPT_EOF'
          Ты — автор changelog для open-source проекта "girl-agent" (ИИ-движок для Telegram, имитирующий девушку-собеседницу).

          Из списка сырых git-коммитов сгенерируй красивую секцию changelog. Правила:
          - Пиши на русском
          - Группируй по категориям с эмодзи (только те, для которых есть изменения):
            🚀 Новое
            🐛 Исправления
            🔧 Улучшения
            📝 Документация
          - Пропускай merge-коммиты ("Merge pull request ...") и chore(release) коммиты
          - Перепиши каждый пункт человечным, понятным языком
          - Убери PR-номера, имена веток, технический жаргон (feat:, fix:, refactor: и т.д.)
          - Каждый пункт — одна строка, начинается с "- "
          - Объединяй связанные или дублирующиеся изменения в один пункт
          - НЕ добавляй заголовок версии, дату или вступление — только категории и список
          - Между категориями ставь пустую строку
          - Если коммит уже написан понятно — можно оставить как есть, только убери префиксы
          PROMPT_EOF

          # Добавляем коммиты к промпту
          printf '\nКоммиты:\n%s' "$COMMITS" >> /tmp/prompt.txt

          PROMPT=$(cat /tmp/prompt.txt)

          # Формируем JSON через jq (безопасное экранирование)
          JSON_BODY=$(jq -n --arg prompt "$PROMPT" '{
            model: "gpt-4o-mini",
            messages: [{role: "user", content: $prompt}],
            temperature: 0.3,
            max_tokens: 2000
          }')

          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://models.inference.ai.azure.com/chat/completions" \
            -H "Authorization: Bearer $AI_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$JSON_BODY" 2>/dev/null) || true

          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -1)
          BODY=$(echo "$HTTP_RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" = "200" ]; then
            AI_CHANGELOG=$(echo "$BODY" | jq -r '.choices[0].message.content // empty')
            if [ -n "$AI_CHANGELOG" ]; then
              echo "$AI_CHANGELOG" > /tmp/changelog_entry.txt
              echo "✅ AI changelog сгенерирован"
              exit 0
            fi
          fi

          echo "⚠️ GitHub Models API недоступен (HTTP $HTTP_CODE), используем очищенные коммиты"
          generate_fallback

      - name: Update CHANGELOG.md
        if: steps.check.outputs.has_changes == 'true'
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          DATE=$(date -u +%Y-%m-%d)

          {
            echo "# Changelog"
            echo ""
            echo "## ${VERSION}"
            echo ""
            echo "Дата: ${DATE}"
            echo ""
            cat /tmp/changelog_entry.txt
            echo ""
            # старый changelog без первой строки "# Changelog"
            tail -n +2 CHANGELOG.md
          } > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md

      - name: Commit, tag, and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): v${VERSION}"
          git tag "v${VERSION}"
          git push origin master --tags

      - name: Trigger docker publish
        if: steps.check.outputs.has_changes == 'true'
        run: gh workflow run "Publish docker image" --ref master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger npm publish
        if: steps.check.outputs.has_changes == 'true'
        run: gh workflow run "Publish to npm" --ref master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
